<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackJack - Contagem</title>
<style>
body { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); min-height:100vh; margin:0; padding:20px; color:#e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
.container { max-width:800px; margin:0 auto; background:rgba(255,255,255,0.05); border-radius:15px; padding:30px; box-shadow:0 8px 32px rgba(0,0,0,0.3); backdrop-filter:blur(10px); }
h1 { text-align:center; color:#00d4ff; margin-bottom:10px; font-size:2.5em; text-shadow:0 0 10px rgba(0,212,255,0.5); }
.subtitle { text-align:center; color:#888; margin-bottom:30px; font-size:1.1em; }
.section-title { color:#00d4ff; margin-bottom:15px; font-size:1.3em; border-bottom:2px solid #00d4ff; padding-bottom:8px; }
.card-select { padding:12px; border-radius:8px; border:2px solid #333; background:rgba(255,255,255,0.05); color:#e0e0e0; font-size:1.1em; width:120px; }
.card-select option { color:#000; }
.btn { padding:12px 24px; border:none; border-radius:8px; cursor:pointer; font-size:1em; font-weight:bold; margin:5px; }
.btn-danger { background:linear-gradient(45deg,#ff4757,#cc0000); color:white; }
.hand-info { display:flex; justify-content:space-around; margin:20px 0; padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; flex-wrap:wrap; gap:10px; }
.info-item { text-align:center; min-width:120px; }
.info-label { font-size:0.9em; color:#888; margin-bottom:5px; }
.info-value { font-size:1.3em; font-weight:bold; color:#00d4ff; }
.decision-box { display:inline-block; padding:20px 40px; border-radius:12px; font-size:2em; font-weight:bold; text-transform:uppercase; letter-spacing:2px; margin-top:15px; }
.decision-HIT { background:linear-gradient(45deg,#ff4757,#cc0000); color:white; }
.decision-STAND { background:linear-gradient(45deg,#2ed573,#1e904d); color:white; }
.decision-DOUBLE { background:linear-gradient(45deg,#ff6b35,#f7931e); color:white; }
.decision-SPLIT { background:linear-gradient(45deg,#8e44ad,#5d1088); color:white; }

/* Nova classe para recomendação */
.bet-red { color:red; font-weight:bold; }
</style>
</head>
<body>
<div class="container">
  <h1>BlackJack - Contagem</h1>
  <p class="subtitle">Estratégia Básica + Contagem de Cartas</p>

  <!-- Configuração -->
  <div class="cards-section">
    <h2 class="section-title">⚙️ Configuração</h2>
    <label for="numDecks">Número de baralhos:</label>
    <select id="numDecks" onchange="setDecks(this.value)">
      <option value="1">1</option>
      <option value="6" selected>6</option>
      <option value="8">8</option>
    </select>
  </div>

  <!-- Suas cartas -->
  <div class="cards-section">
    <h2 class="section-title">🃏 Suas Cartas</h2>
    <div id="playerCardsContainer"></div>
    <div class="buttons-container">
      <button class="btn btn-danger" onclick="removeCard()">- Remover Carta</button>
      <button class="btn btn-danger" onclick="resetCount()">Novo Jogo / Novo Baralho</button>
    </div>
  </div>

  <!-- Carta do dealer -->
  <div class="cards-section">
    <h2 class="section-title">🎴 Carta do Dealer</h2>
    <select class="card-select" id="dealerCard"></select>
  </div>

  <!-- Contagem -->
  <div class="hand-info">
    <div class="info-item"><div class="info-label">Running Count</div><div class="info-value" id="runningCount">0</div></div>
    <div class="info-item"><div class="info-label">True Count</div><div class="info-value" id="trueCount">0</div></div>
    <div class="info-item"><div class="info-label">Recomendação</div><div class="info-value" id="betAdvice">--</div></div>
  </div>

  <!-- Decisão ótima -->
  <div class="decision-output">
    <h2 class="section-title">🟢 Decisão</h2>
    <div id="decision" class="decision-box" style="display:none;"></div>
    <p id="decisionText" style="margin-top:20px; font-size:1.2em; color:#888;">
      Selecione suas cartas e a carta do dealer
    </p>
  </div>
</div>

<script>
let playerCards = ['', ''];
let maxCards = 8;
let runningCount = 0;
let numDecks = 6;

function setDecks(n){ numDecks=parseInt(n); resetCount(); }

function cardCountValue(card){
  if(["2","3","4","5","6"].includes(card)) return +1;
  if(["10","J","Q","K","A"].includes(card)) return -1;
  return 0;
}

function addCard(){
  if(playerCards.length<maxCards){ playerCards.push(''); updateCardInputs(); updateCount(); updateDecision(); }
}
function removeCard(){
  if(playerCards.length>2){ playerCards.pop(); updateCardInputs(); updateCount(); updateDecision(); }
}
  if(trueCount>=2){
    document.getElementById("betAdvice").innerHTML = "<strong class='bet-red'>True Count: continue apostando</strong>";
  } else {
    document.getElementById("betAdvice").innerHTML = "<strong class='bet-red'>True Count: pare as apostas</strong>";
  }
}

function resetCount(){
  playerCards=['',''];
  runningCount=0;
  document.getElementById("runningCount").textContent=0;
  document.getElementById("trueCount").textContent=0;
  document.getElementById("betAdvice").textContent="--";
  document.getElementById("decision").style.display="none";
  document.getElementById("decisionText").textContent="Selecione suas cartas e a carta do dealer";
  updateCardInputs();
}

// Funções auxiliares para decisão
function cardRank(card){
  if(!card) return null;
  if(card==="A") return 1;
  if(["J","Q","K","10"].includes(card)) return 10;
  return parseInt(card);
}

function calculateHandValue(cards){
  let total=0, aces=0;
  cards.forEach(c=>{
    if(c==="A"){ aces++; total+=11; }
    else if(["J","Q","K","10"].includes(c)){ total+=10; }
    else if(c){ total+=parseInt(c); }
  });
  while(total>21 && aces>0){ total-=10; aces--; }
  return { value: total, isSoft: aces>0 };
}

function getBasicStrategyDecision(playerCards, dealerVal){
  const activeCards=playerCards.filter(c=>c);
  const { value: total, isSoft }=calculateHandValue(activeCards);

  // Pares
  if(activeCards.length===2 && activeCards[0]===activeCards[1]){
    const pairCard=activeCards[0];
    if(pairCard==="A"||pairCard==="8") return "SPLIT";
    if(["10","J","Q","K"].includes(pairCard)) return "STAND";
    if(pairCard==="9") return (dealerVal>=2&&dealerVal<=9&&dealerVal!==7)?"SPLIT":"STAND";
    if(pairCard==="7") return (dealerVal>=2&&dealerVal<=7)?"SPLIT":"HIT";
    if(pairCard==="6") return (dealerVal>=2&&dealerVal<=6)?"SPLIT":"HIT";
    if(pairCard==="5") return (dealerVal>=2&&dealerVal<=9)?"DOUBLE":"HIT";
    if(pairCard==="4") return (dealerVal===5||dealerVal===6)?"SPLIT":"HIT";
    if(pairCard==="3"||pairCard==="2") return (dealerVal>=2&&dealerVal<=7)?"SPLIT":"HIT";
  }

  // Soft hands
  if(isSoft){
    if(total>=19) return "STAND";
    if(total===18){
      if(dealerVal>=3&&dealerVal<=6) return "DOUBLE";
      if([2,7,8].includes(dealerVal)) return "STAND";
      return "HIT";
    }
    if(total===17) return (dealerVal>=3&&dealerVal<=6)?"DOUBLE":"HIT";
    if(total===15||total===16) return (dealerVal>=4&&dealerVal<=6)?"DOUBLE":"HIT";
    if(total===13||total===14) return (dealerVal===5||dealerVal===6)?"DOUBLE":"HIT";
    return "HIT";
  }

  // Hard hands
  if(total>=17) return "STAND";
  if(total===16) return (dealerVal>=2&&dealerVal<=6)?"STAND":"HIT";
  if(total>=13&&total<=15) return (dealerVal>=2&&dealerVal<=6)?"STAND":"HIT";
  if(total===12) return (dealerVal>=4&&dealerVal<=6)?"STAND":"HIT";
  if(total===11) return (dealerVal!==1)?"DOUBLE":"HIT";
  if(total===10) return (dealerVal>=2&&dealerVal<=9)?"DOUBLE":"HIT";
  if(total===9) return (dealerVal>=3&&dealerVal<=6)?"DOUBLE":"HIT";
  return "HIT";
}

function updateDecision(){
  const dealerVal=cardRank(document.getElementById("dealerCard").value);
  const activePlayerCards=playerCards.filter(c=>c);

  if(activePlayerCards.length<2||!dealerVal){
    document.getElementById("decision").style.display="none";
    document.getElementById("decisionText").textContent="Selecione suas cartas e a carta do dealer";
    return;
  }

  const decision=getBasicStrategyDecision(playerCards,dealerVal);
  let message="";
  switch(decision){
    case "HIT": message="📈 Pegue outra carta"; break;
    case "STAND": message="🛑 Fique com a mão atual"; break;
    case "DOUBLE": message="💰 Dobre a aposta e pegue apenas uma carta"; break;
    case "SPLIT": message="✂️ Divida o par"; break;
  }

  const decisionElement=document.getElementById("decision");
  decisionElement.textContent=decision;
  decisionElement.className=`decision-box decision-${decision}`;
  decisionElement.style.display="inline-block";
  document.getElementById("decisionText").textContent=message;
}

// Inicializa menus ao carregar
updateCardInputs();
</script>
</body>
</html>
