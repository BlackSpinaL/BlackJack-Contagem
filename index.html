<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackJack - Contagem</title>
<style>
/* Mantém estilo original */
@font-face { font-family: 'Aptos'; src: local('Aptos'); }
* { box-sizing: border-box; font-family: 'Aptos','Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
body { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); min-height:100vh; margin:0; padding:20px; color:#e0e0e0; }
.container { max-width:800px; margin:0 auto; background:rgba(255,255,255,0.05); border-radius:15px; padding:30px; box-shadow:0 8px 32px rgba(0,0,0,0.3); backdrop-filter:blur(10px); }
h1 { text-align:center; color:#00d4ff; margin-bottom:10px; font-size:2.5em; text-shadow:0 0 10px rgba(0,212,255,0.5); }
.subtitle { text-align:center; color:#888; margin-bottom:30px; font-size:1.1em; }
.section-title { color:#00d4ff; margin-bottom:15px; font-size:1.3em; border-bottom:2px solid #00d4ff; padding-bottom:8px; }
.card-select { padding:12px; border-radius:8px; border:2px solid #333; background:rgba(255,255,255,0.05); color:#e0e0e0; font-size:1.1em; width:120px; }
.card-select option { color:#000; }
.btn { padding:12px 24px; border:none; border-radius:8px; cursor:pointer; font-size:1em; font-weight:bold; margin:5px; }
.btn-primary { background:linear-gradient(45deg,#00d4ff,#0099cc); color:white; }
.btn-danger { background:linear-gradient(45deg,#ff4757,#cc0000); color:white; }
.btn-success { background:linear-gradient(45deg,#2ed573,#1e904d); color:white; }
.hand-info { display:flex; justify-content:space-around; margin:20px 0; padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; flex-wrap:wrap; gap:10px; }
.info-item { text-align:center; min-width:120px; }
.info-label { font-size:0.9em; color:#888; margin-bottom:5px; }
.info-value { font-size:1.3em; font-weight:bold; color:#00d4ff; }
@media (max-width:600px){ h1{font-size:1.8em;} .card-select{width:100px;} .info-item{min-width:100px;} }
</style>
</head>
<body>
<div class="container">
  <h1>BlackJack - Contagem</h1>
  <p class="subtitle">Estratégia Básica + Contagem de Cartas</p>

  <!-- Configuração -->
  <div class="cards-section">
    <h2 class="section-title">⚙️ Configuração</h2>
    <label for="numDecks">Número de baralhos:</label>
    <select id="numDecks" onchange="setDecks(this.value)">
      <option value="1">1</option>
      <option value="6" selected>6</option>
      <option value="8">8</option>
    </select>
  </div>

  <!-- Suas cartas -->
  <div class="cards-section">
    <h2 class="section-title">🃏 Suas Cartas</h2>
    <div id="playerCardsContainer"></div>
    <div class="buttons-container">
      <button class="btn btn-primary" onclick="addCard()">+ Adicionar Carta</button>
      <button class="btn btn-danger" onclick="removeCard()">- Remover Carta</button>
    </div>
  </div>

  <!-- Carta do dealer -->
  <div class="cards-section">
    <h2 class="section-title">🎴 Carta do Dealer</h2>
    <select class="card-select" id="dealerCard"></select>
  </div>

  <!-- Contagem -->
  <div class="hand-info">
    <div class="info-item"><div class="info-label">Running Count</div><div class="info-value" id="runningCount">0</div></div>
    <div class="info-item"><div class="info-label">True Count</div><div class="info-value" id="trueCount">0</div></div>
    <div class="info-item"><div class="info-label">Recomendação</div><div class="info-value" id="betAdvice">--</div></div>
  </div>

  <div class="buttons-container">
    <button class="btn btn-danger" onclick="resetCount()">Novo Jogo / Novo Baralho</button>
  </div>
</div>

<script>
let playerCards = ['', ''];
let maxCards = 8;
let runningCount = 0;
let numDecks = 6;

function setDecks(n){ numDecks=parseInt(n); resetCount(); }

function cardCountValue(card){
  if(["2","3","4","5","6"].includes(card)) return +1;
  if(["10","J","Q","K","A"].includes(card)) return -1;
  return 0;
}

function addCard(){
  if(playerCards.length<maxCards){ playerCards.push(''); updateCardInputs(); updateCount(); }
}
function removeCard(){
  if(playerCards.length>2){ playerCards.pop(); updateCardInputs(); updateCount(); }
}

function updateCardInputs(){
  const container=document.getElementById('playerCardsContainer');
  container.innerHTML='';
  playerCards.forEach((card,index)=>{
    const select=document.createElement('select');
    select.className='card-select';
    select.id=`card${index+1}`;
    select.innerHTML=`<option value="">-- Carta ${index+1} --</option>
      <option value="A">Ás</option><option value="2">2</option><option value="3">3</option>
      <option value="4">4</option><option value="5">5</option><option value="6">6</option>
      <option value="7">7</option><option value="8">8</option><option value="9">9</option>
      <option value="10">10</option><option value="J">Valete</option><option value="Q">Dama</option><option value="K">Rei</option>`;
    select.value=card;
    select.onchange=()=>{ playerCards[index]=select.value; updateCount(); };
    container.appendChild(select);
  });
  const dealer=document.getElementById('dealerCard');
  dealer.innerHTML=`<option value="">-- Carta Dealer --</option>
    <option value="A">Ás</option><option value="2">2</option><option value="3">3</option>
    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
    <option value="10">10</option><option value="J">Valete</option><option value="Q">Dama</option><option value="K">Rei</option>`;
}
function updateCount(){
  runningCount=0;
  playerCards.forEach(c=>{ runningCount+=cardCountValue(c); });
  let trueCount=runningCount/numDecks;
  document.getElementById("runningCount").textContent=runningCount;
  document.getElementById("trueCount").textContent=trueCount.toFixed(2);
  document.getElementById("betAdvice").textContent=(trueCount>=2)?"True Count: continue apostando":"True Count: pare as apostas";
}
function resetCount(){
  playerCards=['',''];
  runningCount=0;
  document.getElementById("runningCount").textContent=0;
  document.getElementById("trueCount").textContent=0;
  document.getElementById("betAdvice").textContent="--";
  updateCardInputs();
}
